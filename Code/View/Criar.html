<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Museu Digital</title>
</head>
<body>
    <h1>Museu Digital de Dinossauros</h1> <hr>
    <div>
        <fieldset>
            <legend>Criar nova conta</legend>
            <form action=""><br>
                <label for="usuario">Usuario: </label>
                <input type="text" id="usuario" placeholder="Insira seu usuario aqui..."><br><br>
                <label for="email">Email: </label>
                <input type="email" id="email" placeholder="Insira seu email aqui..."><br><br>
                <label for="senha">Senha: </label>
                <input type="password" id="senha" placeholder="Insira sua senhha aqui..."><br><br>
                <input type="submit" value="criar">
                <input type="reset" value="limpar"><br><br>
            </form>
            <a href="../index.html">Voltar para a pagina de login</a>
        </fieldset>
    </div>
</body>
</html>
